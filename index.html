<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedro's Cheatsheet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:      #0d1117;
      --bg2:     #161b27;
      --bg3:     #1e2535;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text:    #e6edf3;
      --muted:   #8b949e;
      --muted2:  #6b7280;
      --green:   #22c55e;
      --blue:    #3b82f6;
      --amber:   #f59e0b;
      --red:     #ef4444;
      --purple:  #a855f7;
      --cyan:    #06b6d4;
      --sidebar: 220px;
      --top:     54px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }

    /* ── PASSWORD GATE ── */
    #gate {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .gate-box {
      width: 100%; max-width: 360px; padding: 0 24px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    .gate-logo { font-size: 22px; font-weight: 700; }
    .gate-logo span { color: var(--green); }
    .gate-sub { font-size: 13px; color: var(--muted2); margin-top: -12px; }
    .gate-input {
      width: 100%; background: var(--bg2); border: 1px solid var(--border2);
      color: var(--text); border-radius: 10px; padding: 12px 16px;
      font-size: 15px; font-family: 'Inter', sans-serif; outline: none;
      transition: border-color .15s; text-align: center; letter-spacing: .1em;
      -webkit-appearance: none; appearance: none;
    }
    .gate-input:focus { border-color: var(--blue); }
    .gate-input.shake { animation: shake .35s ease; border-color: var(--red); }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
    .gate-btn {
      width: 100%; padding: 12px; background: var(--blue); color: #fff;
      border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: background .15s;
    }
    .gate-btn:hover { background: #2563eb; }
    .gate-err { font-size: 12px; color: var(--red); min-height: 16px; }

    /* ── APP (hidden until unlocked) ── */
    #app { display: none; }
    #app.unlocked { display: block; }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; height: var(--top);
      background: rgba(13,17,23,0.96); border-bottom: 1px solid var(--border);
      -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
      display: flex; align-items: center; gap: 12px; padding: 0 16px; z-index: 100;
    }
    .logo { font-weight: 700; font-size: 15px; white-space: nowrap; flex-shrink: 0; }
    .logo span { color: var(--green); }
    .stats { font-size: 11px; color: var(--muted2); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
    .search-wrap { flex: 1; max-width: 420px; position: relative; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted2); pointer-events: none; }
    #q {
      width: 100%; background: var(--bg2); border: 1px solid var(--border2); color: var(--text);
      border-radius: 9px; padding: 7px 11px 7px 32px; font-size: 13px; outline: none;
      font-family: 'Inter', sans-serif; transition: border-color .15s;
      -webkit-appearance: none; appearance: none;
    }
    #q:focus { border-color: var(--blue); }
    #q::placeholder { color: var(--muted2); }
    .lock-btn {
      background: none; border: 1px solid var(--border2); color: var(--muted2);
      border-radius: 7px; padding: 5px 8px; cursor: pointer; font-size: 11px;
      font-family: 'Inter', sans-serif; transition: all .12s; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .lock-btn:hover { color: var(--text); border-color: var(--border2); }

    /* ── LAYOUT ── */
    .layout { display: flex; padding-top: var(--top); min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar); flex-shrink: 0; position: fixed;
      top: var(--top); bottom: 0; left: 0; overflow-y: auto;
      border-right: 1px solid var(--border); background: var(--bg); padding: 12px 0 40px;
    }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
    .sidebar-label { padding: 4px 14px 8px; font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted2); }
    .nav-btn {
      display: flex; align-items: center; gap: 9px; padding: 8px 14px;
      cursor: pointer; color: var(--muted); font-size: 13px;
      border: none; background: none; width: 100%; text-align: left;
      transition: background .12s, color .12s; -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:hover { background: var(--bg2); color: var(--text); }
    .nav-btn.active { background: var(--bg2); color: var(--text); font-weight: 600; }
    .nav-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .nav-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nav-count { font-size: 11px; color: var(--muted2); font-family: 'JetBrains Mono', monospace; }
    .sidebar-add { margin: 8px 10px 0; width: calc(100% - 20px); }

    /* ── MAIN ── */
    .main { margin-left: var(--sidebar); flex: 1; padding: 20px 22px 60px; min-width: 0; }

    /* ── MOBILE FILTER STRIP ── */
    .filter-strip {
      display: none; overflow-x: auto; gap: 8px; padding: 9px 14px;
      border-bottom: 1px solid var(--border); background: var(--bg);
      position: fixed; top: var(--top); left: 0; right: 0; z-index: 90;
      scrollbar-width: none;
    }
    .filter-strip::-webkit-scrollbar { display: none; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px;
      border-radius: 20px; background: var(--bg2);
      color: var(--muted); font-size: 12px; font-weight: 600; white-space: nowrap;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: all .12s;
      -webkit-tap-highlight-color: transparent; border: none; flex-shrink: 0;
    }
    .chip.active { background: rgba(59,130,246,.15); color: var(--blue); outline: 1px solid rgba(59,130,246,.4); }

    /* ── CARDS ── */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
    .card.hidden { display: none; }
    .card-head {
      display: flex; align-items: center; gap: 11px; padding: 12px 15px;
      border-bottom: 1px solid var(--border); background: rgba(255,255,255,.015);
    }
    .accent { width: 4px; height: 28px; border-radius: 4px; flex-shrink: 0; }
    .card-meta { flex: 1; min-width: 0; }
    .card-sub { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted2); margin-bottom: 1px; }
    .card-title { font-size: 13px; font-weight: 700; }
    .tag-pill { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 700; border: 1px solid var(--border2); color: var(--muted); background: var(--bg3); white-space: nowrap; }
    .head-btns { display: flex; gap: 5px; }

    /* ── ITEMS ── */
    .item {
      display: flex; align-items: flex-start; gap: 10px; padding: 11px 15px;
      border-bottom: 1px solid var(--border); transition: background .1s;
    }
    .item:last-child { border-bottom: none; }
    .item:hover { background: rgba(255,255,255,.02); }
    .item:hover .item-acts { opacity: 1; }
    .item-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 7px; flex-shrink: 0; }
    .item-body { flex: 1; min-width: 0; }
    .item-cmd { display: block; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--text); word-break: break-all; line-height: 1.45; }
    .item.concept .item-cmd { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: var(--muted); word-break: break-word; }
    .item-desc { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
    .item-acts { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity .1s; padding-top: 1px; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 7px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border2); background: var(--bg3);
      color: var(--muted); transition: all .12s; font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent; white-space: nowrap;
    }
    .btn:hover { color: var(--text); background: rgba(255,255,255,.07); }
    .btn-icon { padding: 5px 7px; }
    .btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .btn-primary:hover { background: #2563eb; color: #fff; }
    .btn-danger:hover { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.3); color: var(--red); }
    .btn-green { color: var(--green); }
    .btn-green:hover { background: rgba(34,197,94,.08); border-color: rgba(34,197,94,.3); color: var(--green); }
    .copy-btn.ok { color: var(--green); border-color: rgba(34,197,94,.35); background: rgba(34,197,94,.06); }
    .add-row { padding: 8px 15px; border-top: 1px dashed var(--border); }

    /* ── MODALS ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px; padding: 22px; width: 100%; max-width: 500px; margin: 16px; box-shadow: 0 24px 64px rgba(0,0,0,.5); }
    .modal h3 { font-size: 14px; font-weight: 700; margin-bottom: 18px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted2); margin-bottom: 5px; }
    .field input, .field textarea {
      width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
      border-radius: 8px; padding: 8px 11px; font-size: 13px; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color .15s; resize: vertical;
    }
    .field input:focus, .field textarea:focus { border-color: var(--blue); }
    .field textarea { min-height: 68px; }
    .type-toggle { display: flex; gap: 7px; }
    .type-opt {
      flex: 1; padding: 7px; border-radius: 8px; border: 1px solid var(--border2);
      background: var(--bg3); color: var(--muted); cursor: pointer; text-align: center;
      font-size: 12px; font-weight: 600; transition: all .12s; font-family: 'Inter', sans-serif;
    }
    .type-opt.active { border-color: var(--blue); background: rgba(59,130,246,.12); color: var(--blue); }
    .modal-foot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
    .color-row { display: flex; gap: 8px; }
    .swatch { width: 26px; height: 26px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: border-color .12s; }
    .swatch.active { border-color: #fff; }

    /* ── EMPTY ── */
    .empty { display: none; text-align: center; padding: 70px 20px; color: var(--muted2); }
    .empty.show { display: block; }
    .empty p { margin-top: 8px; font-size: 13px; }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      :root { --top: 52px; }
      .sidebar { display: none; }
      .filter-strip { display: flex; }
      .stats { display: none; }
      .search-wrap { max-width: none; }
      .main { margin-left: 0; padding: 12px 12px 40px; padding-top: calc(52px + 46px + 12px); }
      .item-acts { opacity: 1; }
    }
  </style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-logo">Pedro's <span>Cheatsheet</span></div>
    <div class="gate-sub">Enter password to continue</div>
    <input id="gateInput" class="gate-input" type="password" placeholder="••••••••" autocomplete="current-password" />
    <button class="gate-btn" id="gateBtn">Unlock</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="topbar">
    <div class="logo">Pedro's <span>Cheatsheet</span></div>
    <div class="stats" id="stats"></div>
    <div class="search-wrap">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="q" type="search" placeholder="Search commands…" autocomplete="off" autocorrect="off" spellcheck="false" />
    </div>
    <button class="lock-btn" id="lockBtn">🔒 Lock</button>
  </header>

  <div class="filter-strip" id="strip"></div>

  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-label">Sections</div>
      <div id="nav"></div>
      <div style="padding:10px 10px 0">
        <button class="btn btn-green sidebar-add" id="addSecBtn">+ New section</button>
      </div>
    </nav>
    <main class="main">
      <div id="cards"></div>
      <div class="empty" id="empty"><div style="font-size:26px">🔍</div><p>No results.</p></div>
    </main>
  </div>
</div>

<!-- ITEM MODAL -->
<div class="overlay" id="itemModal">
  <div class="modal">
    <h3 id="iTitle">Add command</h3>
    <div class="field"><label>Command / Title</label><input id="iCmd" type="text" placeholder="e.g. git status" /></div>
    <div class="field"><label>Description</label><textarea id="iDesc" placeholder="What does it do?"></textarea></div>
    <div class="field">
      <label>Type</label>
      <div class="type-toggle">
        <button class="type-opt active" id="tCmd">Command (copyable)</button>
        <button class="type-opt" id="tCon">Concept / note</button>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="iCancel">Cancel</button>
      <button class="btn btn-primary" id="iSave">Save</button>
    </div>
  </div>
</div>

<!-- SECTION MODAL -->
<div class="overlay" id="secModal">
  <div class="modal">
    <h3 id="sTitle">New section</h3>
    <div class="field"><label>Title</label><input id="sName" type="text" placeholder="e.g. Git — Basics" /></div>
    <div class="field"><label>Subtitle</label><input id="sSub" type="text" placeholder="e.g. Version control" /></div>
    <div class="field"><label>Tag</label><input id="sTag" type="text" placeholder="e.g. git" /></div>
    <div class="field">
      <label>Colour</label>
      <div class="color-row" id="swatches">
        <div class="swatch active" style="background:#22c55e" data-c="green"></div>
        <div class="swatch" style="background:#3b82f6" data-c="blue"></div>
        <div class="swatch" style="background:#f59e0b" data-c="amber"></div>
        <div class="swatch" style="background:#ef4444" data-c="red"></div>
        <div class="swatch" style="background:#a855f7" data-c="purple"></div>
        <div class="swatch" style="background:#06b6d4" data-c="cyan"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="sCancel">Cancel</button>
      <button class="btn btn-primary" id="sSave">Save section</button>
    </div>
  </div>
</div>

<script>
  const HASH = '1057af94f966130a6db5eb19dabb2d1c196e8b90d1427dba739aa474b6db7c3f';
  const SUPABASE_URL = 'https://bbkiwzbcxmlorcdhcwcc.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_HZp8PpAz8eKlagAmBmV3kQ_SPO6x_KU';

  // ── AUTH ──
  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  function isUnlocked() { return localStorage.getItem('cs_auth') === HASH; }

  function unlock() {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').classList.add('unlocked');
    load();
  }

  function lock() {
    localStorage.removeItem('cs_auth');
    document.getElementById('gate').style.display = 'flex';
    document.getElementById('app').classList.remove('unlocked');
    document.getElementById('gateInput').value = '';
    document.getElementById('gateErr').textContent = '';
  }

  document.getElementById('lockBtn').onclick = lock;

  document.getElementById('gateBtn').onclick = async () => {
    const val = document.getElementById('gateInput').value;
    const h = await sha256(val);
    if (h === HASH) {
      localStorage.setItem('cs_auth', HASH);
      unlock();
    } else {
      const inp = document.getElementById('gateInput');
      inp.classList.add('shake');
      document.getElementById('gateErr').textContent = 'Incorrect password';
      inp.value = '';
      setTimeout(() => inp.classList.remove('shake'), 400);
    }
  };

  document.getElementById('gateInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('gateBtn').click();
  });

  if (isUnlocked()) unlock();

  // ── SUPABASE ──
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  const COLORS = { green:'#22c55e', blue:'#3b82f6', amber:'#f59e0b', red:'#ef4444', purple:'#a855f7', cyan:'#06b6d4' };
  const cv = c => COLORS[c] || COLORS.blue;
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const uid = () => Math.random().toString(36).slice(2,10);

  let sections = [], items = [], activeFilter = 'all';
  let iState = null, sState = null, iType = 'command', sColor = 'green';

  async function load() {
    const [sr, ir] = await Promise.all([
      db.from('sections').select('*').order('sort_order'),
      db.from('items').select('*').order('sort_order'),
    ]);
    sections = sr.data || [];
    items = ir.data || [];
    render();
  }

  function secItems(sid) { return items.filter(i => i.section_id === sid); }

  function render() {
    renderNav(); renderStrip(); renderCards();
    document.getElementById('stats').textContent = `${items.length} commands · ${sections.length} sections`;
  }

  function renderNav() {
    const nav = document.getElementById('nav');
    nav.innerHTML = '';
    mkNav(nav, 'all', 'rgba(255,255,255,.2)', 'All', items.length);
    [...new Set(sections.map(s => s.tag))].forEach(tag => {
      const cnt = items.filter(i => sections.find(s=>s.id===i.section_id)?.tag===tag).length;
      const col = sections.find(s=>s.tag===tag)?.color||'blue';
      mkNav(nav, tag, cv(col), tag, cnt);
    });
  }

  function mkNav(parent, filter, dot, label, count) {
    const b = document.createElement('button');
    b.className = 'nav-btn' + (filter===activeFilter?' active':'');
    b.dataset.filter = filter;
    b.innerHTML = `<span class="nav-dot" style="background:${dot}"></span><span class="nav-name">${esc(label)}</span><span class="nav-count">${count}</span>`;
    b.onclick = () => setFilter(filter);
    parent.appendChild(b);
  }

  function renderStrip() {
    const strip = document.getElementById('strip');
    strip.innerHTML = '';
    mkChip(strip, 'all', 'rgba(255,255,255,.2)', 'All');
    [...new Set(sections.map(s => s.tag))].forEach(tag => {
      mkChip(strip, tag, cv(sections.find(s=>s.tag===tag)?.color||'blue'), tag);
    });
  }

  function mkChip(parent, filter, dot, label) {
    const b = document.createElement('button');
    b.className = 'chip' + (filter===activeFilter?' active':'');
    b.dataset.filter = filter;
    b.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${dot};display:inline-block"></span>${esc(label)}`;
    b.onclick = () => setFilter(filter);
    parent.appendChild(b);
  }

  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));
    document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));
    applySearch();
  }

  function renderCards() {
    const cont = document.getElementById('cards');
    cont.innerHTML = '';
    sections.forEach(sec => cont.appendChild(buildCard(sec)));
    applySearch();
  }

  function buildCard(sec) {
    const el = document.createElement('article');
    el.className = 'card'; el.id = `s-${sec.id}`; el.dataset.tag = sec.tag;
    el.innerHTML = `
      <div class="card-head">
        <div class="accent" style="background:${cv(sec.color)}"></div>
        <div class="card-meta">
          <div class="card-sub">${esc(sec.subtitle||'')}</div>
          <div class="card-title">${esc(sec.title)}</div>
        </div>
        <span class="tag-pill">${esc(sec.tag)}</span>
        <div class="head-btns">
          <button class="btn btn-icon" data-es="${sec.id}" title="Edit"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button class="btn btn-icon btn-danger" data-ds="${sec.id}" title="Delete"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
        </div>
      </div>
      <div class="items-list" id="il-${sec.id}">
        ${secItems(sec.id).map(item => itemHTML(sec, item)).join('')}
      </div>
      <div class="add-row">
        <button class="btn btn-green" data-ai="${sec.id}">+ Add command</button>
      </div>`;
    el.querySelector('[data-es]').onclick = () => openEditSec(sec.id);
    el.querySelector('[data-ds]').onclick = () => delSec(sec.id);
    el.querySelector('[data-ai]').onclick = () => openAddItem(sec.id);
    el.querySelectorAll('[data-copy]').forEach(b => b.onclick = () => doCopy(b));
    el.querySelectorAll('[data-ei]').forEach(b => b.onclick = () => openEditItem(sec.id, b.dataset.ei));
    el.querySelectorAll('[data-di]').forEach(b => b.onclick = () => delItem(b.dataset.di));
    return el;
  }

  function itemHTML(sec, item) {
    const isConcept = item.type === 'concept';
    const copyBtn = isConcept ? '' : `<button class="btn copy-btn" data-copy="${esc(item.cmd)}">Copy</button>`;
    return `
      <div class="item ${isConcept?'concept':''}" data-iid="${item.id}">
        <div class="item-dot" style="background:${isConcept?'rgba(255,255,255,.15)':cv(sec.color)}"></div>
        <div class="item-body">
          <span class="item-cmd">${esc(item.cmd)}</span>
          <div class="item-desc">${esc(item.description||'')}</div>
        </div>
        ${copyBtn}
        <div class="item-acts">
          <button class="btn btn-icon" data-ei="${item.id}" title="Edit"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button class="btn btn-icon btn-danger" data-di="${item.id}" title="Delete"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
      </div>`;
  }

  function applySearch() {
    const q = document.getElementById('q').value.trim().toLowerCase();
    let vis = 0;
    sections.forEach(sec => {
      const card = document.getElementById(`s-${sec.id}`);
      if (!card) return;
      if (activeFilter !== 'all' && sec.tag !== activeFilter) { card.classList.add('hidden'); return; }
      if (!q) { card.classList.remove('hidden'); card.querySelectorAll('.item').forEach(r=>r.style.display=''); vis++; return; }
      let show = sec.title.toLowerCase().includes(q);
      card.querySelectorAll('.item').forEach(row => {
        const item = items.find(i=>i.id===row.dataset.iid);
        const m = item && (item.cmd.toLowerCase().includes(q)||(item.description||'').toLowerCase().includes(q));
        row.style.display = m ? '' : 'none';
        if (m) show = true;
      });
      card.classList.toggle('hidden', !show);
      if (show) vis++;
    });
    document.getElementById('empty').classList.toggle('show', vis===0);
  }

  function doCopy(btn) {
    const text = btn.dataset.copy;
    const done = () => { btn.textContent='Copied!'; btn.classList.add('ok'); setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('ok'); },1400); };
    if (navigator.clipboard) navigator.clipboard.writeText(text).then(done).catch(done);
    else {
      const ta = document.createElement('textarea'); ta.value=text; ta.style.cssText='position:fixed;opacity:0';
      document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done();
    }
  }

  // ── ITEM MODAL ──
  function setType(t) {
    iType = t;
    document.getElementById('tCmd').classList.toggle('active', t==='command');
    document.getElementById('tCon').classList.toggle('active', t==='concept');
  }
  document.getElementById('tCmd').onclick = () => setType('command');
  document.getElementById('tCon').onclick = () => setType('concept');

  function openAddItem(sid) {
    iState = { sid, id: null };
    document.getElementById('iTitle').textContent = 'Add command';
    document.getElementById('iCmd').value = '';
    document.getElementById('iDesc').value = '';
    setType('command');
    document.getElementById('itemModal').classList.add('open');
    setTimeout(() => document.getElementById('iCmd').focus(), 50);
  }

  function openEditItem(sid, id) {
    const item = items.find(i=>i.id===id); if (!item) return;
    iState = { sid, id };
    document.getElementById('iTitle').textContent = 'Edit command';
    document.getElementById('iCmd').value = item.cmd;
    document.getElementById('iDesc').value = item.description||'';
    setType(item.type);
    document.getElementById('itemModal').classList.add('open');
    setTimeout(() => document.getElementById('iCmd').focus(), 50);
  }

  function closeItemModal() { document.getElementById('itemModal').classList.remove('open'); iState=null; }
  document.getElementById('iCancel').onclick = closeItemModal;

  document.getElementById('iSave').onclick = async () => {
    const cmd = document.getElementById('iCmd').value.trim();
    const desc = document.getElementById('iDesc').value.trim();
    if (!cmd) return;
    const { sid, id } = iState;
    if (id) {
      await db.from('items').update({ cmd, description: desc, type: iType }).eq('id', id);
      const item = items.find(i=>i.id===id);
      item.cmd=cmd; item.description=desc; item.type=iType;
    } else {
      const n = { id: uid(), section_id: sid, cmd, description: desc, type: iType, sort_order: secItems(sid).length };
      await db.from('items').insert(n);
      items.push(n);
    }
    closeItemModal(); render();
  };

  async function delItem(id) {
    await db.from('items').delete().eq('id', id);
    items = items.filter(i=>i.id!==id);
    render();
  }

  // ── SECTION MODAL ──
  document.querySelectorAll('.swatch').forEach(s => s.onclick = () => {
    sColor = s.dataset.c;
    document.querySelectorAll('.swatch').forEach(x=>x.classList.toggle('active',x.dataset.c===sColor));
  });

  document.getElementById('addSecBtn').onclick = openAddSec;

  function openAddSec() {
    sState = null;
    document.getElementById('sTitle').textContent = 'New section';
    ['sName','sSub','sTag'].forEach(id => document.getElementById(id).value='');
    sColor='green'; document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s.dataset.c==='green'));
    document.getElementById('secModal').classList.add('open');
    setTimeout(() => document.getElementById('sName').focus(), 50);
  }

  function openEditSec(id) {
    const sec = sections.find(s=>s.id===id); if (!sec) return;
    sState = id;
    document.getElementById('sTitle').textContent = 'Edit section';
    document.getElementById('sName').value=sec.title;
    document.getElementById('sSub').value=sec.subtitle||'';
    document.getElementById('sTag').value=sec.tag;
    sColor=sec.color; document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s.dataset.c===sec.color));
    document.getElementById('secModal').classList.add('open');
    setTimeout(() => document.getElementById('sName').focus(), 50);
  }

  function closeSecModal() { document.getElementById('secModal').classList.remove('open'); sState=null; }
  document.getElementById('sCancel').onclick = closeSecModal;

  document.getElementById('sSave').onclick = async () => {
    const title = document.getElementById('sName').value.trim();
    const subtitle = document.getElementById('sSub').value.trim();
    const tag = document.getElementById('sTag').value.trim()||'misc';
    if (!title) return;
    if (sState) {
      await db.from('sections').update({ title, subtitle, tag, color: sColor }).eq('id', sState);
      const sec = sections.find(s=>s.id===sState);
      sec.title=title; sec.subtitle=subtitle; sec.tag=tag; sec.color=sColor;
    } else {
      const n = { id: uid(), title, subtitle, tag, color: sColor, sort_order: sections.length };
      await db.from('sections').insert(n);
      sections.push(n);
    }
    closeSecModal(); render();
  };

  async function delSec(id) {
    const sec = sections.find(s=>s.id===id);
    if (!confirm(`Delete "${sec.title}" and all its commands?`)) return;
    await db.from('sections').delete().eq('id', id);
    sections = sections.filter(s=>s.id!==id);
    items = items.filter(i=>i.section_id!==id);
    render();
  }

  document.getElementById('itemModal').onclick = e => { if(e.target===e.currentTarget) closeItemModal(); };
  document.getElementById('secModal').onclick = e => { if(e.target===e.currentTarget) closeSecModal(); };
  document.addEventListener('keydown', e => {
    if (e.key==='Escape') { closeItemModal(); closeSecModal(); }
    if (e.key==='/' && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA') {
      e.preventDefault(); document.getElementById('q').focus();
    }
  });
  document.getElementById('q').addEventListener('input', applySearch);
</script>
</body>
</html>
